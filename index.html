<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Crypto Analyzer - AI+Crypto项目评分</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 16px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-bottom: 10px; font-size: 32px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 18px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; }
        button { background: #4a6ee0; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background: #3a5ed0; }
        .quick-tokens { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .token-btn { padding: 10px 20px; background: #f5f7fa; border: none; border-radius: 8px; cursor: pointer; color: #555; }
        .token-btn:hover { background: #e8ebf0; }
        .result-box { display: none; background: #f9fafc; padding: 30px; border-radius: 12px; border: 2px solid #e8ebf0; }
        .result-box.show { display: block; }
        .score-big { font-size: 80px; font-weight: bold; color: #4a6ee0; text-align: center; margin: 20px 0; }
        .score-label { text-align: center; color: #666; margin-bottom: 30px; font-size: 20px; }
        .dimensions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .dimension { background: white; padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #e8ebf0; }
        .dimension h3 { color: #333; margin-bottom: 10px; }
        .dimension-score { font-size: 36px; font-weight: bold; color: #555; }
        .dimension-max { color: #999; }
        .loading { display: none; text-align: center; padding: 30px; }
        .loading.show { display: block; }
        .spinner { width: 40px; height: 40px; border: 3px solid #f0f0f0; border-top-color: #4a6ee0; border-radius: 50%; margin: 0 auto 20px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        footer { margin-top: 40px; text-align: center; color: #888; font-size: 14px; }
        .error { background: #fee; color: #c00; padding: 15px; border-radius: 8px; margin: 20px 0; display: none; }
        .error.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 AI Crypto Analyzer</h1>
        <p class="subtitle">100分制AI+Crypto项目评分工具 | 数据驱动，理性投资</p>
        
        <div class="search-box">
            <input type="text" id="tokenInput" placeholder="输入项目符号，如：FET" value="FET">
            <button id="analyzeBtn">开始分析</button>
        </div>
        
        <div class="quick-tokens">
            <div class="token-btn" data-token="FET">FET</div>
            <div class="token-btn" data-token="RNDR">RNDR</div>
            <div class="token-btn" data-token="AGIX">AGIX</div>
            <div class="token-btn" data-token="OCEAN">OCEAN</div>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在分析项目数据...</p>
        </div>
        
        <div class="error" id="errorBox">
            <p id="errorText"></p>
        </div>
        
        <div class="result-box" id="resultBox">
            <div class="score-big" id="totalScore">82</div>
            <div class="score-label" id="scoreLabel">Fetch.ai (FET) 总分</div>
            
            <div class="dimensions">
                <div class="dimension">
                    <h3>🧠 技术可行性</h3>
                    <div><span class="dimension-score" id="techScore">34</span><span class="dimension-max">/40</span></div>
                </div>
                <div class="dimension">
                    <h3>💰 经济可持续</h3>
                    <div><span class="dimension-score" id="econScore">24</span><span class="dimension-max">/30</span></div>
                </div>
                <div class="dimension">
                    <h3>📈 市场需求匹配</h3>
                    <div><span class="dimension-score" id="marketScore">24</span><span class="dimension-max">/30</span></div>
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 30px;">
                <button id="shareBtn" style="background: #1da1f2;">🐦 分享到X</button>
            </div>
        </div>
        
        <footer>
            <p>⚠️ 本工具提供教育分析，非投资建议。数据来源：CoinMarketCap | 版本：1.0.0</p>
        </footer>
    </div>
    
    <script>
        // 预设数据
        const presetData = {
            'FET': { name: 'Fetch.ai', scores: { total: 82, tech: 34, econ: 24, market: 24 } },
            'RNDR': { name: 'Render Token', scores: { total: 78, tech: 30, econ: 26, market: 22 } },
            'AGIX': { name: 'SingularityNET', scores: { total: 71, tech: 28, econ: 22, market: 21 } },
            'OCEAN': { name: 'Ocean Protocol', scores: { total: 68, tech: 26, econ: 20, market: 22 } }
        };
        
        // 获取元素
        const tokenInput = document.getElementById('tokenInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loading = document.getElementById('loading');
        const errorBox = document.getElementById('errorBox');
        const errorText = document.getElementById('errorText');
        const resultBox = document.getElementById('resultBox');
        
        const totalScoreEl = document.getElementById('totalScore');
        const scoreLabelEl = document.getElementById('scoreLabel');
        const techScoreEl = document.getElementById('techScore');
        const econScoreEl = document.getElementById('econScore');
        const marketScoreEl = document.getElementById('marketScore');
        
        // 事件监听
        analyzeBtn.addEventListener('click', analyzeToken);
        tokenInput.addEventListener('keypress', (e) => e.key === 'Enter' && analyzeToken());
        
        // 快速选择按钮
        document.querySelectorAll('.token-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const token = this.getAttribute('data-token');
                tokenInput.value = token;
                analyzeToken();
            });
        });
        
        // 分享按钮
        document.getElementById('shareBtn').addEventListener('click', function() {
            const token = tokenInput.value.trim().toUpperCase();
            const data = presetData[token] || presetData.FET;
            
            const text = `我刚刚分析了 ${data.name} (${token}) 的评分！\n\n总分: ${data.scores.total}/100\n\n🔗 使用 AI Crypto Analyzer 免费工具测试你的项目:\nhttps://mujinw.github.io/crypto-analyzer/\n\n#AIxCrypto #${token} #CryptoAnalysis`;
            
            // 尝试复制到剪贴板
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ 推文已复制到剪贴板！\n推文中已包含你的实际网址，可以直接发布到X。');
            }).catch(() => {
                prompt('请手动复制以下推文到X发布（请替换网址）：', text);
            });
        });
        
        // 分析函数
        function analyzeToken() {
            const token = tokenInput.value.trim().toUpperCase();
            
            if (!token) {
                showError('请输入项目符号');
                return;
            }
            
            // 重置UI
            hideError();
            loading.classList.add('show');
            resultBox.classList.remove('show');
            analyzeBtn.disabled = true;
            
            // 模拟API调用延迟
            setTimeout(() => {
                if (presetData[token]) {
                    displayResults(token);
                } else {
                    showError(`项目 "${token}" 未找到，请使用 FET, RNDR, AGIX, OCEAN`);
                }
                
                loading.classList.remove('show');
                analyzeBtn.disabled = false;
            }, 800);
        }
        
        // 显示结果
        function displayResults(token) {
            const data = presetData[token];
            const scores = data.scores;
            
            totalScoreEl.textContent = scores.total;
            scoreLabelEl.textContent = `${data.name} (${token}) 总分`;
            
            techScoreEl.textContent = scores.tech;
            econScoreEl.textContent = scores.econ;
            marketScoreEl.textContent = scores.market;
            
            resultBox.classList.add('show');
            
            // 滚动到结果
            resultBox.scrollIntoView({ behavior: 'smooth' });
        }
        
        // 错误处理
        function showError(message) {
            errorText.textContent = message;
            errorBox.classList.add('show');
        }
        
        function hideError() {
            errorBox.classList.remove('show');
        }
        
        // 初始化
        function init() {
            setTimeout(() => {
                analyzeToken();
            }, 300);
        }
        
        // 页面加载完成
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
